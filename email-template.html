<!--
  TinyApe Magic Link Email Template
  ===================================
  Paste this into Supabase Dashboard:
  Authentication → Email Templates → Magic Link

  Supabase variables:
  {{ .ConfirmationURL }} — the magic link URL
  {{ .SiteURL }}         — your site URL (https://tinyape.netlify.app)
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your TinyApe Magic Link</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f0e6; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f0e6; padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="420" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); overflow:hidden; max-width:420px; width:90%;">

          <!-- Header -->
          <tr>
            <td align="center" style="padding:36px 32px 20px;">
              <div style="font-family:'Arial Black', Arial, sans-serif; font-size:28px; color:#1a1a1a; letter-spacing:-1px;">
                TinyApe
              </div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:0 32px 28px; text-align:center;">
              <p style="font-size:18px; color:#1a1a1a; margin:0 0 8px; font-weight:bold;">
                Ready to swing in?
              </p>
              <p style="font-size:14px; color:#6b6358; margin:0 0 28px; line-height:1.5;">
                Tap the button below to log in. No password needed &mdash; this link is your key.
              </p>

              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td style="background-color:#e52e0a; border-radius:6px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block; padding:13px 36px; color:#ffffff; font-size:15px; font-weight:bold; text-decoration:none; font-family:Arial, sans-serif;">
                      Log In to TinyApe
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 32px;">
              <div style="border-top:1px solid #e8e0d4;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px 28px; text-align:center;">
              <p style="font-size:11px; color:#a89f90; margin:0 0 8px; line-height:1.5;">
                This link expires in 1 hour. If you didn't request this, you can safely ignore it.
              </p>
              <p style="font-size:11px; color:#b8b0a4; margin:0; font-style:italic;">
                Small and powerful. &mdash; tinyape.netlify.app
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
