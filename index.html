<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TinyApe - Small and powerful.</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* ─── LOGIN PAGE ─── */
  .login-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
  }
  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 44px 40px 36px;
    max-width: 360px;
    width: 90%;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .login-logo {
    font-family: 'Bagel Fat One', cursive;
    font-size: 42px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .login-mascot {
    margin-bottom: 16px;
    line-height: 0;
  }
  .login-tagline {
    font-family: 'Source Serif 4', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 32px;
  }
  .login-label {
    display: block;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .login-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent-red); outline: none; box-shadow: 0 0 0 2px rgba(229,46,10,0.12); }
  .login-btn {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    border: none;
    border-radius: 6px;
    background: var(--accent-red);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .login-message {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-secondary);
    min-height: 20px;
    line-height: 1.4;
  }
  .login-message.error { color: var(--accent-red); }
  .login-message.success { color: var(--accent-green); }
  .login-signout {
    position: fixed;
    bottom: 16px;
    right: 16px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    z-index: 1000;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .login-signout:hover { opacity: 1; }
  /* Hide sign out when mobile popups are open */
  body.notes-open .login-signout,
  body.modal-open .login-signout { display: none; }
  /* Mobile: sign out flows at page bottom, not fixed */
  @media (max-width: 640px) {
    .login-signout {
      position: static;
      display: block;
      margin: 40px auto 24px;
      opacity: 0.4;
      z-index: auto;
    }
  }
  .app-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .loading-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
// ─── AUTH FLOW ───
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const msg = document.getElementById('loginMessage');
  const btn = document.getElementById('loginBtn');

  if (!email) {
    msg.textContent = 'Please enter your email';
    msg.className = 'login-message error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  msg.textContent = '';

  const result = await TinyApeAuth.signIn(email);

  if (result.error) {
    msg.textContent = result.error.message || 'Something went wrong';
    msg.className = 'login-message error';
    btn.disabled = false;
    btn.textContent = 'Send Magic Link';
  } else {
    msg.textContent = 'Check your email for a magic link!';
    msg.className = 'login-message success';
    btn.textContent = 'Link sent!';
  }
}

async function handleSignOut() {
  await TinyApeAuth.signOut();
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

// Enter key on login input
document.getElementById('loginEmail').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleLogin();
});

// ─── BOOT SEQUENCE ───
async function boot() {
  const user = await TinyApeAuth.initAuth();

  if (user) {
    await loadAndShowApp();
  } else {
    document.getElementById('loadingPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
  }

  // Listen for auth changes (magic link callback)
  TinyApeAuth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await loadAndShowApp();
    } else if (event === 'SIGNED_OUT') {
      document.getElementById('appPage').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
    }
  });
}

async function loadAndShowApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('loadingPage').style.display = 'flex';

  await refreshFromSupabase(true);  // force on initial load

  // Seed default drawer categories for new users
  if (Object.keys(store.drawerCategories).length === 0) {
    api.addDrawerCategory('work', 'Work', '#3498db');
    api.addDrawerCategory('personal', 'Personal', '#27ae60');
  }

  document.getElementById('loadingPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';

  // Init the app
  setDate();
  render();
  renderHallOfFame();

  // Restore today's creature friends from Supabase
  if (window._pendingCreatureUnlocks && typeof restoreCreaturesFromUnlocks === 'function') {
    setTimeout(() => {
      restoreCreaturesFromUnlocks(window._pendingCreatureUnlocks);
      delete window._pendingCreatureUnlocks;
    }, 500);  // slight delay so header is fully rendered
  }

  // Welcome toast
  if (store.tasks.length === 0 && store.killedTasks.length === 0) {
    setTimeout(() => showToast('Welcome to TinyApe! Add your first task to get started.'), 500);
  }

  // Start realtime push-based sync + fallback poll
  startRealtimeSync();
  startPeriodicSync();
}

// ─── FULL REFRESH FROM SUPABASE ───
// Used for initial load and infrequent fallback sync.
// Returns true if data changed (callers should re-render).
function _storeFingerprint() {
  const taskPart = store.tasks.map(t =>
    `${t.id}|${t.title}|${t.today}|${t.todayOrder}|${t.done}|${t.dueDate}|${t.drawer}|${t.notes}|${t.isProject}|${t.trackTime}|${t.killed}|${t.completedAt}|${t.recurring}|${t.recurDays}|${t.drawerCategory}|${(t.timeSessions||[]).length}`
  ).join(';');
  const killedPart = store.killedTasks.map(t => `${t.id}|${t.killedAt}`).join(';');
  const logPart = completionLog.length;
  return `${taskPart}##${killedPart}##${logPart}`;
}

async function refreshFromSupabase(force) {
  try {
    // Block refresh while local writes are in-flight (unless forced)
    if (!force && window._isSafeToSync && !window._isSafeToSync()) {
      console.log('[Sync] Skipping refresh — local writes in progress');
      return false;
    }

    // Always flush pending writes before pulling from DB
    if (window._flushSyncQueue) {
      await window._flushSyncQueue();
    }

    // If writes are STILL in-flight after flush, don't overwrite local state
    if (window._isSafeToSync && !window._isSafeToSync()) {
      console.log('[Sync] Writes still in-flight after flush — skipping refresh');
      return false;
    }

    const beforeFP = _storeFingerprint();
    const data = await TinyApeDB.loadAllData();

    // Re-check after network call — a mutation may have happened during fetch
    if (window._isSafeToSync && !window._isSafeToSync()) {
      console.log('[Sync] Discarding refresh — local mutation during fetch');
      return false;
    }

    if (data) {
      const localOnlyTasks = store.tasks.filter(t => typeof t.id === 'number');

      // Snapshot local state of recently-written tasks so stale DB reads
      // don't revert flags during the echo window. Cover BOTH active and killed.
      const localSnap = new Map();     // id -> { drawer, today, todayOrder, done, drawerCategory }
      const localKilled = new Set();   // ids of tasks killed locally within echo window
      if (window._isEcho) {
        store.tasks.forEach(t => {
          if (window._isEcho(t.id)) {
            localSnap.set(String(t.id), { drawer: t.drawer, today: t.today, todayOrder: t.todayOrder, done: t.done, drawerCategory: t.drawerCategory });
          }
        });
        store.killedTasks.forEach(t => {
          if (window._isEcho(t.id)) {
            localKilled.add(String(t.id));
          }
        });
      }

      store.tasks = data.tasks || [];
      store.killedTasks = data.killedTasks || [];
      // Diagnostic: log drawer tasks from DB to track resurrections
      const drawerFromDb = data.tasks ? data.tasks.filter(t => t.drawer) : [];
      if (drawerFromDb.length > 0) {
        console.log('[Sync:REFRESH] Drawer tasks from DB:', drawerFromDb.map(t => `${t.title} (killed:${t.killed})`));
      }

      // Re-apply local state for in-flight writes (prevents stale DB overwrite)
      if (localSnap.size > 0) {
        store.tasks.forEach(t => {
          const snap = localSnap.get(String(t.id));
          if (snap) Object.assign(t, snap);
        });
      }

      // Protect recently-killed tasks: if DB hasn't caught up yet,
      // the task may still be in data.tasks as non-killed. Move it back.
      if (localKilled.size > 0) {
        const toMove = [];
        store.tasks = store.tasks.filter(t => {
          if (localKilled.has(String(t.id))) {
            toMove.push(t);
            return false;
          }
          return true;
        });
        toMove.forEach(t => {
          if (!store.killedTasks.some(k => k.id === t.id)) {
            store.killedTasks.push({ ...t, killed: true, killedAt: t.killedAt || new Date().toISOString() });
          }
        });
      }

      // Re-add local-only tasks not yet in DB
      if (localOnlyTasks.length > 0) {
        localOnlyTasks.forEach(localTask => {
          const alreadyInDb = store.tasks.some(t =>
            t._localId === localTask.id ||
            (t.title === localTask.title && t.today === localTask.today && t.done === localTask.done)
          );
          if (!alreadyInDb) store.tasks.push(localTask);
        });
      }

      // Drawer categories
      if (data.drawerCategories && typeof data.drawerCategories === 'object') {
        if (Array.isArray(data.drawerCategories)) {
          store.drawerCategories = {};
          data.drawerCategories.forEach(cat => {
            store.drawerCategories[cat.key || cat.id] = { label: cat.label, color: cat.color };
          });
        } else {
          store.drawerCategories = data.drawerCategories;
        }
      }

      // Completion log (preserve IDs for realtime DELETE matching)
      if (data.completionLog) {
        completionLog.length = 0;
        data.completionLog.forEach(e => {
          const ts = e.ts || e.createdAt || e.created_at;
          if (ts) completionLog.push({ ts, id: e.id || null });
        });
      }

      const maxId = store.tasks.reduce((max, t) => {
        const n = typeof t.id === 'number' ? t.id : 0;
        return n > max ? n : max;
      }, 0);
      store.nextId = Math.max(store.nextId || 0, maxId + 1);

      // Store creature unlocks for restoration
      if (data.creatureUnlocks && data.creatureUnlocks.length > 0) {
        window._pendingCreatureUnlocks = data.creatureUnlocks;
      }

      const afterFP = _storeFingerprint();
      if (afterFP === beforeFP) {
        console.log('[Sync] Data unchanged — skipping re-render');
        return false;
      }
      return true;
    }
    return false;
  } catch (err) {
    console.error('[Sync] Error loading data:', err);
    return false;
  }
}

// ═══════════════════════════════════════════════
// SUPABASE REALTIME — push-based sync
// ═══════════════════════════════════════════════
// Instead of polling every 30s and replacing the entire store,
// we subscribe to row-level changes via Supabase Realtime.
// Only changes from OTHER sessions trigger re-renders.
// Our own writes are suppressed via echo detection in sync.js.

let _realtimeChannel = null;
let _realtimeConnected = false;

function startRealtimeSync() {
  if (!window.supabase || _realtimeChannel) return;

  const channel = window.supabase.channel('tinyape-sync', {
    config: { broadcast: { self: false } }
  });

  // ─── TASKS ───
  channel.on('postgres_changes', {
    event: 'INSERT', schema: 'public', table: 'tasks'
  }, (payload) => {
    const row = payload.new;
    if (window._isEcho && window._isEcho(row.id)) return;
    console.log('[Realtime] Task INSERT:', row.title);
    const jsTask = TinyApeDB._mapDbTaskToJs(row);
    if (row.killed) {
      if (!store.killedTasks.some(t => t.id === row.id)) {
        store.killedTasks.push(jsTask);
      }
    } else {
      if (!store.tasks.some(t => t.id === row.id)) {
        store.tasks.push(jsTask);
      }
    }
    render();
  });

  channel.on('postgres_changes', {
    event: 'UPDATE', schema: 'public', table: 'tasks'
  }, (payload) => {
    const row = payload.new;
    if (window._isEcho && window._isEcho(row.id)) return;
    // Don't overwrite a task the user is actively editing
    if (typeof currentNotesTaskId !== 'undefined' && row.id === currentNotesTaskId) return;
    console.log('[Realtime] Task UPDATE:', row.title, 'killed:', row.killed, 'drawer:', row.drawer);
    const jsTask = TinyApeDB._mapDbTaskToJs(row);
    const idx = store.tasks.findIndex(t => t.id === row.id);
    const kIdx = store.killedTasks.findIndex(t => t.id === row.id);

    if (row.killed) {
      // Task was killed — move from active to killed
      if (idx !== -1) store.tasks.splice(idx, 1);
      if (kIdx !== -1) { store.killedTasks[kIdx] = jsTask; }
      else { store.killedTasks.push(jsTask); }
    } else {
      // Task is active — move from killed to active if needed
      if (kIdx !== -1) {
        console.warn('[Realtime] ⚠️ RESURRECTING killed task:', row.title, 'killed:', row.killed, 'drawer:', row.drawer);
      }
      if (kIdx !== -1) store.killedTasks.splice(kIdx, 1);
      if (idx !== -1) { store.tasks[idx] = jsTask; }
      else { store.tasks.push(jsTask); }
    }
    render();
    renderHallOfFame();
  });

  channel.on('postgres_changes', {
    event: 'DELETE', schema: 'public', table: 'tasks'
  }, (payload) => {
    const id = payload.old.id;
    if (window._isEcho && window._isEcho(id)) return;
    console.log('[Realtime] Task DELETE:', id);
    store.tasks = store.tasks.filter(t => t.id !== id);
    store.killedTasks = store.killedTasks.filter(t => t.id !== id);
    render();
  });

  // ─── COMPLETION EVENTS ───
  channel.on('postgres_changes', {
    event: 'INSERT', schema: 'public', table: 'completion_events'
  }, async (payload) => {
    if (window._isCompletionEcho && window._isCompletionEcho()) return;
    const row = payload.new;
    console.log('[Realtime] Completion INSERT');
    completionLog.push({ ts: row.created_at, id: row.id });
    renderHallOfFame();
    // A completion on another device means a creature was spawned — fetch and restore it
    try {
      const unlocks = await TinyApeDB.loadCreatureUnlocks();
      if (unlocks && unlocks.length > 0 && typeof restoreCreaturesFromUnlocks === 'function') {
        restoreCreaturesFromUnlocks(unlocks);
      }
    } catch(e) { console.error('Creature sync error:', e); }
  });

  channel.on('postgres_changes', {
    event: 'DELETE', schema: 'public', table: 'completion_events'
  }, (payload) => {
    if (window._isCompletionEcho && window._isCompletionEcho()) return;
    const id = payload.old.id;
    console.log('[Realtime] Completion DELETE:', id);
    const idx = completionLog.findIndex(e => e.id === id);
    if (idx !== -1) {
      completionLog.splice(idx, 1);
    } else if (completionLog.length > 0) {
      completionLog.pop();  // fallback: remove most recent
    }
    renderHallOfFame();
  });

  // ─── DRAWER CATEGORIES ───
  channel.on('postgres_changes', {
    event: '*', schema: 'public', table: 'drawer_categories'
  }, (payload) => {
    if (window._isCategoryEcho && window._isCategoryEcho()) return;
    console.log('[Realtime] Category change:', payload.eventType);
    if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
      const row = payload.new;
      store.drawerCategories[row.key || row.id] = { label: row.label, color: row.color };
    } else if (payload.eventType === 'DELETE') {
      const id = payload.old.id;
      delete store.drawerCategories[id];
    }
    renderDrawer();
  });

  // ─── SUBSCRIBE ───
  channel.subscribe((status) => {
    if (status === 'SUBSCRIBED') {
      _realtimeConnected = true;
      console.log('✓ Realtime sync connected');
    } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
      _realtimeConnected = false;
      console.warn('[Realtime] Disconnected — falling back to poll');
    }
  });

  _realtimeChannel = channel;
}

function stopRealtimeSync() {
  if (_realtimeChannel) {
    window.supabase.removeChannel(_realtimeChannel);
    _realtimeChannel = null;
    _realtimeConnected = false;
    console.log('[Realtime] Channel removed');
  }
}

// ─── CROSS-DEVICE SYNC (visibility change) ───
document.addEventListener('visibilitychange', async () => {
  if (document.getElementById('appPage').style.display === 'none') return;

  if (document.visibilityState === 'hidden') {
    // Mobile safety: flush notes + pending writes before tab kill
    if (typeof saveCurrentNotes === 'function') saveCurrentNotes();
    if (window._flushSyncQueue) {
      try { await window._flushSyncQueue(); } catch(e) { /* best-effort */ }
    }
  }

  if (document.visibilityState === 'visible') {
    // Always do a full refresh + reconnect when tab becomes visible.
    // Mobile browsers kill WebSocket connections while backgrounded,
    // and _realtimeConnected can be stale (Supabase thinks it's connected
    // but the underlying socket is dead).
    const changed = await refreshFromSupabase(true);
    setDate();
    if (changed) {
      render(); renderHallOfFame();
      // Restore any creature unlocks fetched during refresh
      if (window._pendingCreatureUnlocks && typeof restoreCreaturesFromUnlocks === 'function') {
        restoreCreaturesFromUnlocks(window._pendingCreatureUnlocks);
        delete window._pendingCreatureUnlocks;
      }
    }
    // Always tear down and recreate the realtime channel
    stopRealtimeSync();
    startRealtimeSync();
  }
});

// ─── BEFORE UNLOAD SAFETY NET ───
window.addEventListener('beforeunload', () => {
  if (typeof saveCurrentNotes === 'function') saveCurrentNotes();
  if (window._flushSyncQueue) {
    window._flushSyncQueue().catch(() => {});
  }
});

// ─── FALLBACK POLL (every 5 minutes) ───
// Safety net: catches anything realtime might have missed.
// With fingerprint check, this won't cause flicker if nothing changed.
let _syncInterval = null;
function startPeriodicSync() {
  if (_syncInterval) return;
  _syncInterval = setInterval(async () => {
    if (document.visibilityState !== 'visible') return;
    if (document.getElementById('appPage').style.display === 'none') return;

    // Flush any failed writes first
    if (window._flushSyncQueue) {
      try { await window._flushSyncQueue(); } catch(e) {}
    }

    // Only do a full refresh if realtime is disconnected or as a safety net
    const changed = await refreshFromSupabase();
    if (changed) {
      setDate();
      render();
      renderHallOfFame();
    }
  }, 60000);  // 60 seconds — safety net for when realtime drops
}

boot();
</script>
