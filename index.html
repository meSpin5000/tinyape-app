<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TinyApe - Small and powerful.</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* ─── LOGIN PAGE ─── */
  .login-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
  }
  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 44px 40px 36px;
    max-width: 360px;
    width: 90%;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .login-logo {
    font-family: 'Bagel Fat One', cursive;
    font-size: 42px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .login-mascot {
    margin-bottom: 16px;
    line-height: 0;
  }
  .login-tagline {
    font-family: 'Source Serif 4', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 32px;
  }
  .login-label {
    display: block;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .login-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent-red); outline: none; box-shadow: 0 0 0 2px rgba(229,46,10,0.12); }
  .login-btn {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    border: none;
    border-radius: 6px;
    background: var(--accent-red);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .login-message {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-secondary);
    min-height: 20px;
    line-height: 1.4;
  }
  .login-message.error { color: var(--accent-red); }
  .login-message.success { color: var(--accent-green); }
  .app-footer-actions {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 1000;
  }
  .login-signout, .feedback-btn {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .login-signout:hover, .feedback-btn:hover { opacity: 1; }
  /* Hide footer actions when mobile popups are open */
  body.notes-open .app-footer-actions,
  body.modal-open .app-footer-actions { display: none; }

  /* Feedback popup */
  .feedback-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 10000;
  }
  .feedback-popup {
    position: fixed;
    bottom: 56px;
    right: 16px;
    width: 320px;
    max-width: 90vw;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    padding: 16px;
    z-index: 10001;
    font-family: 'Inter', sans-serif;
  }
  .feedback-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .feedback-title {
    font-family: 'Source Serif 4', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .feedback-close {
    background: none; border: none;
    font-size: 16px; color: var(--text-muted);
    cursor: pointer; padding: 0;
  }
  .feedback-close:hover { color: var(--accent-red); }
  .feedback-popup textarea {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    resize: vertical;
    min-height: 80px;
  }
  .feedback-popup textarea:focus {
    outline: none;
    border-color: var(--accent-red);
  }
  .feedback-submit {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: var(--accent-red);
    color: white;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .feedback-submit:hover { opacity: 0.85; }
  .feedback-submit:disabled { opacity: 0.5; cursor: default; }

  /* Mobile: footer flows at page bottom */
  @media (max-width: 640px) {
    .app-footer-actions {
      position: static;
      display: flex;
      justify-content: center;
      margin: 40px auto 24px;
      opacity: 0.7;
      z-index: auto;
    }
    .feedback-popup {
      bottom: 0; left: 0; right: 0;
      width: 100vw; max-width: 100vw;
      border-radius: 14px 14px 0 0;
      position: fixed;
    }
  }
  .app-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .loading-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
// ─── AUTH FLOW ───
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const msg = document.getElementById('loginMessage');
  const btn = document.getElementById('loginBtn');

  if (!email) {
    msg.textContent = 'Please enter your email';
    msg.className = 'login-message error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  msg.textContent = '';

  try {
    // Ensure Supabase is initialized (may not be ready on slow mobile connections)
    if (!window.supabase) {
      console.warn('[Auth] Supabase not ready — retrying init');
      await TinyApeAuth.initAuth();
    }

    if (!window.supabase) {
      msg.textContent = 'Still connecting — please try again in a moment';
      msg.className = 'login-message error';
      btn.disabled = false;
      btn.textContent = 'Send Magic Link';
      return;
    }

    const result = await TinyApeAuth.signIn(email);

    if (!result.success) {
      const errMsg = typeof result.error === 'string' ? result.error : (result.error && result.error.message);
      msg.textContent = errMsg || 'Something went wrong — please try again';
      msg.className = 'login-message error';
      btn.disabled = false;
      btn.textContent = 'Send Magic Link';
    } else {
      msg.textContent = 'Check your email for a magic link!';
      msg.className = 'login-message success';
      btn.textContent = 'Link sent!';
    }
  } catch (err) {
    console.error('[Auth] handleLogin error:', err);
    msg.textContent = err.message || 'Something went wrong — please try again';
    msg.className = 'login-message error';
    btn.disabled = false;
    btn.textContent = 'Send Magic Link';
  }
}

async function handleSignOut() {
  await TinyApeAuth.signOut();
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

// ─── FEEDBACK FORM ───
function toggleFeedbackForm() {
  const popup = document.getElementById('feedbackPopup');
  const overlay = document.getElementById('feedbackOverlay');
  const isOpen = popup.style.display !== 'none';
  if (isOpen) {
    closeFeedback();
  } else {
    // Pre-fill user email if available
    try {
      const session = window.supabase && window.supabase.auth.getSession();
      if (session) {
        session.then(({ data }) => {
          if (data && data.session && data.session.user) {
            document.getElementById('feedbackUserEmail').value = data.session.user.email || '';
          }
        });
      }
    } catch(e) {}
    popup.style.display = 'block';
    overlay.style.display = 'block';
    document.getElementById('feedbackMessage').focus();
  }
}

function closeFeedback() {
  document.getElementById('feedbackPopup').style.display = 'none';
  document.getElementById('feedbackOverlay').style.display = 'none';
}

function handleFeedbackSubmit(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById('feedbackSubmitBtn');
  const msg = document.getElementById('feedbackMessage').value.trim();
  if (!msg) return false;

  btn.disabled = true;
  btn.textContent = 'Sending...';

  fetch('/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams(new FormData(form)).toString()
  }).then(() => {
    btn.textContent = 'Sent!';
    document.getElementById('feedbackMessage').value = '';
    setTimeout(() => {
      closeFeedback();
      btn.disabled = false;
      btn.textContent = 'Submit';
      if (typeof showToast === 'function') showToast('Thanks for the feedback!');
    }, 800);
  }).catch(() => {
    btn.disabled = false;
    btn.textContent = 'Submit';
    if (typeof showToast === 'function') showToast('Failed to send — try again');
  });

  return false;
}

// Enter key on login input
document.getElementById('loginEmail').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleLogin();
});

// ─── BOOT SEQUENCE ───
async function boot() {
  const user = await TinyApeAuth.initAuth();

  if (user) {
    await loadAndShowApp();
  } else {
    document.getElementById('loadingPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
  }

  // Listen for auth changes (magic link callback)
  TinyApeAuth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await loadAndShowApp();
    } else if (event === 'SIGNED_OUT') {
      document.getElementById('appPage').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
    }
  });
}

async function loadAndShowApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('loadingPage').style.display = 'flex';

  await refreshFromSupabase(true);  // force on initial load

  // Seed default drawer categories for new users
  if (Object.keys(store.drawerCategories).length === 0) {
    api.addDrawerCategory('work', 'Work', '#3498db');
    api.addDrawerCategory('personal', 'Personal', '#27ae60');
  }

  document.getElementById('loadingPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';

  // Init the app
  setDate();
  render();
  renderHallOfFame();

  // Restore today's creature friends from Supabase
  if (window._pendingCreatureUnlocks && typeof restoreCreaturesFromUnlocks === 'function') {
    setTimeout(() => {
      restoreCreaturesFromUnlocks(window._pendingCreatureUnlocks);
      delete window._pendingCreatureUnlocks;
    }, 500);  // slight delay so header is fully rendered
  }

  // Welcome toast
  if (store.tasks.length === 0 && store.killedTasks.length === 0) {
    setTimeout(() => showToast('Welcome to TinyApe! Add your first task to get started.'), 500);
  }

  // Due Today nudge — show once per day if On Deck items are due
  setTimeout(() => checkDueTodayPopup(), 600);

  // Start realtime push-based sync + fallback poll
  startRealtimeSync();
  startPeriodicSync();
}

// ─── FULL REFRESH FROM SUPABASE ───
// Used for initial load and infrequent fallback sync.
// Returns true if data changed (callers should re-render).
function _storeFingerprint() {
  const taskPart = store.tasks.map(t =>
    `${t.id}|${t.title}|${t.today}|${t.todayOrder}|${t.done}|${t.dueDate}|${t.drawer}|${t.notes}|${t.isProject}|${t.trackTime}|${t.killed}|${t.completedAt}|${t.recurring}|${t.recurDays}|${t.drawerCategory}|${(t.timeSessions||[]).length}`
  ).join(';');
  const killedPart = store.killedTasks.map(t => `${t.id}|${t.killedAt}`).join(';');
  const logPart = completionLog.length;
  return `${taskPart}##${killedPart}##${logPart}`;
}

async function refreshFromSupabase(force) {
  try {
    // Block refresh while local writes are in-flight (unless forced)
    if (!force && window._isSafeToSync && !window._isSafeToSync()) {
      console.log('[Sync] Skipping refresh — local writes in progress');
      return false;
    }

    // Always flush pending writes before pulling from DB
    if (window._flushSyncQueue) {
      await window._flushSyncQueue();
    }

    // If writes are STILL in-flight after flush, don't overwrite local state
    if (window._isSafeToSync && !window._isSafeToSync()) {
      console.log('[Sync] Writes still in-flight after flush — skipping refresh');
      return false;
    }

    const beforeFP = _storeFingerprint();
    const data = await TinyApeDB.loadAllData();

    // Re-check after network call — a mutation may have happened during fetch
    if (window._isSafeToSync && !window._isSafeToSync()) {
      console.log('[Sync] Discarding refresh — local mutation during fetch');
      return false;
    }

    if (data) {
      // ─── MERGE-BASED REFRESH ───
      // Instead of replacing store.tasks (which orphans object references held by
      // closures in the schedule popover, notes card, etc.), we MERGE DB data onto
      // existing objects. This preserves object identity so closures never go stale,
      // and eliminates the need for field-by-field localSnap restoration.

      const dbTasks = data.tasks || [];
      const dbKilled = data.killedTasks || [];
      const dbTaskMap = new Map();       // id -> DB task object
      const dbKilledMap = new Map();     // id -> DB killed task object
      dbTasks.forEach(t => dbTaskMap.set(String(t.id), t));
      dbKilled.forEach(t => dbKilledMap.set(String(t.id), t));

      // Helper: check if a task should be protected from DB overwrite
      function _isProtected(id) {
        if (window._isEcho && window._isEcho(id)) return true;
        if (typeof schedulePopoverTaskId !== 'undefined' && schedulePopoverTaskId !== null && id === schedulePopoverTaskId) return true;
        if (typeof currentNotesTaskId !== 'undefined' && currentNotesTaskId !== null && id === currentNotesTaskId) return true;
        return false;
      }

      // Merge fields from DB onto an existing local task object (in-place)
      function _mergeTask(local, db) {
        // Preserve timeSessions — they're in a separate table and won't be in DB task payload
        const localSessions = local.timeSessions;
        // Copy all DB fields onto the existing object (preserves object identity)
        Object.keys(db).forEach(k => { local[k] = db[k]; });
        // Restore timeSessions if DB didn't have them
        if (localSessions && localSessions.length && (!local.timeSessions || !local.timeSessions.length)) {
          local.timeSessions = localSessions;
        }
      }

      // 1. Update existing active tasks + handle killed tasks from DB
      const activeIds = new Set();
      store.tasks = store.tasks.filter(local => {
        const sid = String(local.id);
        // Local-only tasks (numeric IDs not yet in DB) — keep as-is
        if (typeof local.id === 'number') return true;

        const dbVersion = dbTaskMap.get(sid);
        const dbKilledVersion = dbKilledMap.get(sid);

        if (_isProtected(local.id)) {
          // Protected: keep local state, just mark as seen
          activeIds.add(sid);
          return true;
        }

        if (dbKilledVersion) {
          // Task was killed on another device — move to killed list
          _mergeTask(local, dbKilledVersion);
          if (!store.killedTasks.some(k => String(k.id) === sid)) {
            store.killedTasks.push(local);
          }
          return false; // remove from active
        }

        if (dbVersion) {
          // Normal merge
          _mergeTask(local, dbVersion);
          activeIds.add(sid);
          return true;
        }

        // Task exists locally but not in DB — deleted on another device
        return false;
      });

      // 2. Add new tasks from DB that aren't in local store yet
      dbTasks.forEach(dbTask => {
        const sid = String(dbTask.id);
        if (!activeIds.has(sid) && !store.tasks.some(t => String(t.id) === sid)) {
          store.tasks.push(dbTask);
        }
      });

      // 3. Update killed tasks similarly
      const killedIds = new Set();
      store.killedTasks.forEach(local => {
        const sid = String(local.id);
        if (_isProtected(local.id)) { killedIds.add(sid); return; }
        const dbVersion = dbKilledMap.get(sid);
        const dbActiveVersion = dbTaskMap.get(sid);
        if (dbActiveVersion && !dbActiveVersion.killed) {
          // Task was restored on another device — move back to active
          _mergeTask(local, dbActiveVersion);
          store.tasks.push(local);
          local._removeFromKilled = true;
          return;
        }
        if (dbVersion) {
          _mergeTask(local, dbVersion);
        }
        killedIds.add(sid);
      });
      store.killedTasks = store.killedTasks.filter(t => !t._removeFromKilled);

      // 4. Add new killed tasks from DB
      dbKilled.forEach(dbTask => {
        const sid = String(dbTask.id);
        if (!killedIds.has(sid) && !store.killedTasks.some(t => String(t.id) === sid)) {
          store.killedTasks.push(dbTask);
        }
      });

      // Drawer categories — skip if we recently wrote/deleted a category (echo window)
      if (data.drawerCategories && typeof data.drawerCategories === 'object'
          && !(window._isCategoryEcho && window._isCategoryEcho())) {
        if (Array.isArray(data.drawerCategories)) {
          store.drawerCategories = {};
          data.drawerCategories.forEach(cat => {
            store.drawerCategories[cat.key || cat.id] = { label: cat.label, color: cat.color };
          });
        } else {
          store.drawerCategories = data.drawerCategories;
        }
      }

      // Completion log (preserve IDs for realtime DELETE matching)
      if (data.completionLog) {
        completionLog.length = 0;
        data.completionLog.forEach(e => {
          const ts = e.ts || e.createdAt || e.created_at;
          if (ts) completionLog.push({ ts, id: e.id || null });
        });
      }

      const maxId = store.tasks.reduce((max, t) => {
        const n = typeof t.id === 'number' ? t.id : 0;
        return n > max ? n : max;
      }, 0);
      store.nextId = Math.max(store.nextId || 0, maxId + 1);

      // Store creature unlocks for restoration
      if (data.creatureUnlocks && data.creatureUnlocks.length > 0) {
        window._pendingCreatureUnlocks = data.creatureUnlocks;
      }

      const afterFP = _storeFingerprint();
      if (afterFP === beforeFP) {
        console.log('[Sync] Data unchanged — skipping re-render');
        return false;
      }
      return true;
    }
    return false;
  } catch (err) {
    console.error('[Sync] Error loading data:', err);
    return false;
  }
}

// ═══════════════════════════════════════════════
// SUPABASE REALTIME — push-based sync
// ═══════════════════════════════════════════════
// Instead of polling every 30s and replacing the entire store,
// we subscribe to row-level changes via Supabase Realtime.
// Only changes from OTHER sessions trigger re-renders.
// Our own writes are suppressed via echo detection in sync.js.

let _realtimeChannel = null;
let _realtimeConnected = false;

function startRealtimeSync() {
  if (!window.supabase || _realtimeChannel) return;

  const channel = window.supabase.channel('tinyape-sync', {
    config: { broadcast: { self: false } }
  });

  // ─── TASKS ───
  channel.on('postgres_changes', {
    event: 'INSERT', schema: 'public', table: 'tasks'
  }, (payload) => {
    const row = payload.new;
    if (window._isEcho && window._isEcho(row.id)) return;
    // Check if this is our own task awaiting UUID swap (local ID → UUID race)
    const pendingLocal = store.tasks.find(t => t._pendingSaveTimer || (typeof t.id === 'number' && t._localId === undefined));
    if (pendingLocal && !store.tasks.some(t => t.id === row.id)) {
      // Likely our own INSERT — silently swap the ID
      pendingLocal._localId = pendingLocal.id;
      pendingLocal.id = row.id;
      // Merge any DB-side fields (like server-set defaults)
      const jsTask = TinyApeDB._mapDbTaskToJs(row);
      Object.keys(jsTask).forEach(k => {
        if (k !== 'id' && k !== '_localId' && pendingLocal[k] === undefined) {
          pendingLocal[k] = jsTask[k];
        }
      });
      return; // no render needed
    }
    console.log('[Realtime] Task INSERT:', row.title);
    const jsTask = TinyApeDB._mapDbTaskToJs(row);
    if (row.killed) {
      if (!store.killedTasks.some(t => t.id === row.id)) {
        store.killedTasks.push(jsTask);
      }
    } else {
      if (!store.tasks.some(t => t.id === row.id)) {
        store.tasks.push(jsTask);
      }
    }
    render();
  });

  channel.on('postgres_changes', {
    event: 'UPDATE', schema: 'public', table: 'tasks'
  }, (payload) => {
    const row = payload.new;
    if (window._isEcho && window._isEcho(row.id)) return;
    // Don't overwrite a task the user is actively editing
    if (typeof currentNotesTaskId !== 'undefined' && row.id === currentNotesTaskId) return;
    if (typeof schedulePopoverTaskId !== 'undefined' && schedulePopoverTaskId !== null && row.id === schedulePopoverTaskId) return;
    console.log('[Realtime] Task UPDATE:', row.title, 'killed:', row.killed, 'drawer:', row.drawer);
    const jsTask = TinyApeDB._mapDbTaskToJs(row);
    const idx = store.tasks.findIndex(t => t.id === row.id);
    const kIdx = store.killedTasks.findIndex(t => t.id === row.id);
    const existing = idx !== -1 ? store.tasks[idx] : (kIdx !== -1 ? store.killedTasks[kIdx] : null);

    // Preserve local timeSessions — they live in a separate table
    if (existing && existing.timeSessions && existing.timeSessions.length && (!jsTask.timeSessions || !jsTask.timeSessions.length)) {
      jsTask.timeSessions = existing.timeSessions;
    }

    if (row.killed) {
      // Task was killed — merge onto existing or add to killed list
      if (idx !== -1) {
        // Merge onto existing object to preserve references, then move to killed
        Object.keys(jsTask).forEach(k => { store.tasks[idx][k] = jsTask[k]; });
        store.killedTasks.push(store.tasks[idx]);
        store.tasks.splice(idx, 1);
      } else if (kIdx !== -1) {
        // Already in killed — merge in place
        Object.keys(jsTask).forEach(k => { store.killedTasks[kIdx][k] = jsTask[k]; });
      } else {
        store.killedTasks.push(jsTask);
      }
    } else {
      // Task is active
      if (kIdx !== -1) {
        console.warn('[Realtime] ⚠️ RESURRECTING killed task:', row.title);
        // Merge onto existing killed object, then move to active
        Object.keys(jsTask).forEach(k => { store.killedTasks[kIdx][k] = jsTask[k]; });
        store.tasks.push(store.killedTasks[kIdx]);
        store.killedTasks.splice(kIdx, 1);
      } else if (idx !== -1) {
        // Merge onto existing object (preserves closure references)
        Object.keys(jsTask).forEach(k => { store.tasks[idx][k] = jsTask[k]; });
      } else {
        store.tasks.push(jsTask);
      }
    }
    render();
    renderHallOfFame();
  });

  channel.on('postgres_changes', {
    event: 'DELETE', schema: 'public', table: 'tasks'
  }, (payload) => {
    const id = payload.old.id;
    if (window._isEcho && window._isEcho(id)) return;
    console.log('[Realtime] Task DELETE:', id);
    store.tasks = store.tasks.filter(t => t.id !== id);
    store.killedTasks = store.killedTasks.filter(t => t.id !== id);
    render();
  });

  // ─── COMPLETION EVENTS ───
  channel.on('postgres_changes', {
    event: 'INSERT', schema: 'public', table: 'completion_events'
  }, async (payload) => {
    if (window._isCompletionEcho && window._isCompletionEcho()) return;
    const row = payload.new;
    console.log('[Realtime] Completion INSERT');
    completionLog.push({ ts: row.created_at, id: row.id });
    renderHallOfFame();
    // A completion on another device means a creature was spawned — fetch and restore it
    try {
      const unlocks = await TinyApeDB.loadCreatureUnlocks();
      if (unlocks && unlocks.length > 0 && typeof restoreCreaturesFromUnlocks === 'function') {
        restoreCreaturesFromUnlocks(unlocks);
      }
    } catch(e) { console.error('Creature sync error:', e); }
  });

  channel.on('postgres_changes', {
    event: 'DELETE', schema: 'public', table: 'completion_events'
  }, (payload) => {
    if (window._isCompletionEcho && window._isCompletionEcho()) return;
    const id = payload.old.id;
    console.log('[Realtime] Completion DELETE:', id);
    const idx = completionLog.findIndex(e => e.id === id);
    if (idx !== -1) {
      completionLog.splice(idx, 1);
    } else if (completionLog.length > 0) {
      completionLog.pop();  // fallback: remove most recent
    }
    renderHallOfFame();
  });

  // ─── DRAWER CATEGORIES ───
  channel.on('postgres_changes', {
    event: '*', schema: 'public', table: 'drawer_categories'
  }, (payload) => {
    if (window._isCategoryEcho && window._isCategoryEcho()) return;
    console.log('[Realtime] Category change:', payload.eventType);
    if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
      const row = payload.new;
      store.drawerCategories[row.key || row.id] = { label: row.label, color: row.color };
    } else if (payload.eventType === 'DELETE') {
      const id = payload.old.id;
      delete store.drawerCategories[id];
    }
    renderDrawer();
  });

  // ─── SUBSCRIBE ───
  channel.subscribe((status) => {
    if (status === 'SUBSCRIBED') {
      _realtimeConnected = true;
      console.log('✓ Realtime sync connected');
    } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
      _realtimeConnected = false;
      console.warn('[Realtime] Disconnected — falling back to poll');
    }
  });

  _realtimeChannel = channel;
}

function stopRealtimeSync() {
  if (_realtimeChannel) {
    window.supabase.removeChannel(_realtimeChannel);
    _realtimeChannel = null;
    _realtimeConnected = false;
    console.log('[Realtime] Channel removed');
  }
}

// ─── DAY CHANGE DETECTION ───
// Track the current day so we can detect when midnight rolls over
// and clear creatures / reset UI without a full page reload.
let _lastKnownDay = typeof _localDateStr === 'function' ? _localDateStr() : new Date().toLocaleDateString('en-CA');

function checkDayChanged() {
  const today = typeof _localDateStr === 'function' ? _localDateStr() : new Date().toLocaleDateString('en-CA');
  if (today !== _lastKnownDay) {
    _lastKnownDay = today;
    // New day! Clear creatures + reshuffle pool
    if (typeof clearAllCreatures === 'function') clearAllCreatures();
    if (typeof shuffleCreaturePool === 'function') shuffleCreaturePool();
    // Update counter (should be 0 for new day)
    if (typeof updateCounts === 'function') updateCounts();
    // Reset the Due Today popup so it can show again
    try { localStorage.removeItem('tinyape-due-today-shown'); } catch(e) {}
    return true;
  }
  return false;
}

// ─── CROSS-DEVICE SYNC (visibility change) ───
document.addEventListener('visibilitychange', async () => {
  if (document.getElementById('appPage').style.display === 'none') return;

  if (document.visibilityState === 'hidden') {
    // Mobile safety: flush notes + pending writes before tab kill
    if (typeof saveCurrentNotes === 'function') saveCurrentNotes();
    if (window._flushSyncQueue) {
      try { await window._flushSyncQueue(); } catch(e) { /* best-effort */ }
    }
  }

  if (document.visibilityState === 'visible') {
    // Check if the day rolled over while backgrounded
    const dayChanged = checkDayChanged();

    // Always do a full refresh + reconnect when tab becomes visible.
    // Mobile browsers kill WebSocket connections while backgrounded,
    // and _realtimeConnected can be stale (Supabase thinks it's connected
    // but the underlying socket is dead).
    const changed = await refreshFromSupabase(true);
    setDate();
    if (changed || dayChanged) {
      render(); renderHallOfFame();
      // Restore any creature unlocks fetched during refresh
      if (window._pendingCreatureUnlocks && typeof restoreCreaturesFromUnlocks === 'function') {
        restoreCreaturesFromUnlocks(window._pendingCreatureUnlocks);
        delete window._pendingCreatureUnlocks;
      }
      // If day changed, check for new due-today items
      if (dayChanged && typeof checkDueTodayPopup === 'function') {
        checkDueTodayPopup();
      }
    }
    // Always tear down and recreate the realtime channel
    stopRealtimeSync();
    startRealtimeSync();
  }
});

// ─── BEFORE UNLOAD SAFETY NET ───
window.addEventListener('beforeunload', () => {
  if (typeof saveCurrentNotes === 'function') saveCurrentNotes();
  if (window._flushSyncQueue) {
    window._flushSyncQueue().catch(() => {});
  }
});

// ─── FALLBACK POLL (every 5 minutes) ───
// Safety net: catches anything realtime might have missed.
// With fingerprint check, this won't cause flicker if nothing changed.
let _syncInterval = null;
function startPeriodicSync() {
  if (_syncInterval) return;
  _syncInterval = setInterval(async () => {
    if (document.visibilityState !== 'visible') return;
    if (document.getElementById('appPage').style.display === 'none') return;

    // Check if midnight rolled over
    const dayChanged = checkDayChanged();

    // Flush any failed writes first
    if (window._flushSyncQueue) {
      try { await window._flushSyncQueue(); } catch(e) {}
    }

    // Only do a full refresh if realtime is disconnected or as a safety net
    const changed = await refreshFromSupabase();
    if (changed || dayChanged) {
      setDate();
      render();
      renderHallOfFame();
      if (dayChanged && typeof checkDueTodayPopup === 'function') {
        checkDueTodayPopup();
      }
    }
  }, 60000);  // 60 seconds — safety net for when realtime drops
}

boot();
</script>
