<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TinyApe - LOCAL PREVIEW</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .preview-banner {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    background: #e52e0a;
    color: #fff;
    font-family: Inter, sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 14px;
    border-radius: 0 0 6px 6px;
    z-index: 9999;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }
</style>
</head>
<body data-theme="light">

<div class="preview-banner">LOCAL PREVIEW — no sync</div>

<!-- ─── MAIN APP (shown immediately, no auth) ─── -->
<div id="appPage" style="display:block;">

<div class="hall-of-fame" id="hallOfFame"></div>
<div class="hof-modal-overlay" id="hofModalOverlay" onclick="closeHofModal()"></div>
<div class="hof-modal" id="hofModal"><button class="hof-modal-close" onclick="closeHofModal()">✕</button><div id="hofModalContent"></div></div>

<header style="position:sticky;top:0;z-index:100;">
  <div class="logo">TinyApe</div>
  <canvas class="pixel-ape" id="pixelApe" width="24" height="24"></canvas>
  <div class="header-right">
    <span class="date-display" id="dateDisplay"></span>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <svg class="sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<main>
  <!-- TODAY'S LIST -->
  <div class="section-header" style="border-bottom:none; padding-bottom:0;">
    <div class="daily-counter-wrap">
      <div class="daily-counter" id="dailyCounter">0</div>
      <div>
        <h2 class="section-title">Today</h2>
        <span class="daily-counter-label">crushed today</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="section-add-btn" onclick="openAddModal('today')" title="Add to today">+ Add</button>
    </div>
  </div>
  <div class="today-list" id="todayList"></div>

  <!-- ADD TASK MODAL -->
  <div class="add-modal-overlay" id="addModalOverlay" onclick="closeAddModal()"></div>
  <div class="add-modal" id="addModal">
    <div class="add-modal-header">
      <span class="add-modal-title" id="addModalTitle">Add a task</span>
      <button class="add-modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="add-modal-subtitle" id="addModalSubtitle"></div>
    <input type="text" class="add-modal-input" id="addTaskInput" placeholder="What needs to be done?" autocomplete="off" />
    <div class="add-modal-notes-wrap" id="addModalNotesWrap">
      <div class="add-modal-notes" id="addTaskNotes" contenteditable="true" data-placeholder="Add notes…"></div>
    </div>
    <div class="add-modal-pills" id="addModalPills"></div>
    <div class="add-modal-track-section" id="addModalTrackSection" style="display:none;">
      <div class="time-section" style="margin:0;">
        <div class="time-section-header">⏱ Time tracking enabled</div>
        <div class="time-add-form" style="display:block; margin-top:8px;">
          <div class="time-slider-row">
            <input type="range" class="time-slider" id="addTrackSlider" min="15" max="480" step="15" value="30"
                   oninput="document.getElementById('addTrackSliderLabel').textContent = formatMinutes(parseInt(this.value))">
            <span class="time-slider-label" id="addTrackSliderLabel">30m</span>
          </div>
          <textarea class="time-note-input" id="addTrackNote" placeholder="What did you work on? (optional)" rows="2"></textarea>
        </div>
      </div>
    </div>
    <div class="add-modal-actions" id="addModalActions"></div>
    <input type="date" id="hiddenDatePicker" onchange="handleDatePick(this.value)" style="position:absolute;opacity:0;pointer-events:none;" />
  </div>

  <!-- PROJECTS -->
  <div id="projectsSection" class="collapsible-section" data-section="projects">
    <div class="section-header section-header-collapsible" onclick="toggleSectionCollapse('projects')">
      <h2 class="section-title"><span class="section-chevron">›</span> Projects <span class="section-count" id="projectsCount"></span></h2>
      <div style="display:flex;align-items:center;gap:8px;" onclick="event.stopPropagation()">
        <button class="section-add-btn" onclick="openAddModal('project')" title="Add project">+ Add</button>
      </div>
    </div>
    <div class="section-content" id="projectsContent">
      <div id="projectsList"></div>
      <div id="projectsEmpty" class="section-empty-hint">
        Turn any task into a project to track progress and time
      </div>
    </div>
  </div>

  <!-- ON DECK -->
  <div id="onDeckSection" class="collapsible-section" data-section="onDeck">
    <div class="section-header section-header-collapsible" onclick="toggleSectionCollapse('onDeck')">
      <h2 class="section-title"><span class="section-chevron">›</span> On Deck <span class="section-count" id="onDeckCount"></span></h2>
      <div style="display:flex;align-items:center;gap:8px;" onclick="event.stopPropagation()">
        <button class="section-add-btn" onclick="openAddModal('ondeck')" title="Add task">+ Add</button>
      </div>
    </div>
    <div class="section-content" id="onDeckContent">
      <div class="backlog-list" id="backlogList"></div>
    </div>
  </div>

  <!-- DRAWER (inline section for all breakpoints) -->
  <div id="drawerSection" class="collapsible-section" data-section="drawer">
    <div class="section-header section-header-collapsible" onclick="toggleSectionCollapse('drawer')">
      <h2 class="section-title"><span class="section-chevron">›</span> Drawer <span class="section-count" id="drawerCount"></span></h2>
      <div style="display:flex;align-items:center;gap:8px;" onclick="event.stopPropagation()">
        <button class="section-add-btn" onclick="openAddModal('drawer')" title="Add to drawer">+ Add</button>
      </div>
    </div>
    <div class="section-content" id="drawerSectionContent">
      <div class="drawer-cat-pills" id="drawerCatPills"></div>
      <div id="drawerContent"></div>
    </div>
  </div>

  <!-- PROJECTS (hidden, data layer preserved) -->
  <div style="display:none;">
    <div class="section-header" style="margin-top:48px;">
      <h2 class="section-title">Projects</h2>
    </div>
    <div id="projectList"></div>
  </div>

  <!-- COMPLETED -->
  <div id="completedSection" style="display:none;"><div id="completedList"></div></div>
  <div id="killedSection" style="display:none;"><div id="killedList"></div></div>
  <span id="completedAllTime" style="display:none;"></span>

  <!-- Footer pills for Completed & Killed -->
  <div class="archive-footer" id="archiveFooter">
    <button class="archive-pill" id="completedPill" onclick="openArchivePopup('completed')" style="display:none;">
      <span class="archive-pill-icon">✓</span> Crushed <span class="archive-pill-count" id="completedPillCount"></span>
    </button>
    <button class="archive-pill killed" id="killedPill" onclick="openArchivePopup('killed')" style="display:none;">
      <span class="archive-pill-icon">✕</span> Killed <span class="archive-pill-count" id="killedPillCount"></span>
    </button>
  </div>

  <!-- Mobile bottom spacer for comfortable scrolling -->
  <div class="mobile-bottom-spacer"></div>

  <!-- Archive popup overlay -->
  <div class="archive-popup-overlay" id="archivePopupOverlay" onclick="closeArchivePopup()"></div>
  <div class="archive-popup" id="archivePopup">
    <div class="archive-popup-header">
      <span class="archive-popup-title" id="archivePopupTitle"></span>
      <button class="archive-popup-close" onclick="closeArchivePopup()">✕</button>
    </div>
    <div class="archive-popup-list" id="archivePopupList"></div>
  </div>

  <!-- CATEGORIES (hidden) -->
  <div style="display:none;" id="categoryAccordion"></div>

  <footer style="text-align:center;padding:40px 0 0;font-size:10px;color:var(--text-muted);opacity:0.5;font-family:Inter,sans-serif;">
    &copy; 2026 TinyApe &middot; Remember, tasking should be fun.
  </footer>
</main>

<div class="toast" id="toast"></div>

<!-- Old slide-out drawer removed — now inline in drawerSection above -->
<div class="unlock-banner" id="unlockBanner"><span class="bolt">&#9889;</span> <span id="unlockText"></span></div>
<div class="creature-tooltip" id="creatureTooltip"></div>

</div><!-- /appPage -->

<!-- Load app.js only (no config, auth, db, sync) -->
<script>
// ─── STUB: No-op replacements for DB/sync functions ───
// These prevent errors when app.js code tries to call sync/DB functions
window.TinyApeDB = null;
window._isEcho = function() { return false; };
window._isCompletionEcho = function() { return false; };
window._markCompletionWrite = function() {};
window._trackAsyncOp = function(fn) { return fn ? fn() : Promise.resolve(); };
window._isSafeToSync = function() { return true; };
</script>

<script src="js/app.js"></script>

<script>
// ─── SEED SAMPLE DATA (50 tasks for demo) ───
(function() {
  // ── Date helpers ──
  function d(offset) { return new Date(Date.now() + offset * 86400000).toISOString().split('T')[0]; }
  function ts(offset, h, m) {
    var dt = new Date(Date.now() + offset * 86400000);
    dt.setHours(h || 10, m || 0, 0, 0);
    return dt.toISOString();
  }
  const today = d(0), tomorrow = d(1), in2 = d(2), in3 = d(3), in4 = d(4), in5 = d(5), in6 = d(6);
  const nextWeek = d(7), in10 = d(10), in14 = d(14), in21 = d(21), in30 = d(30), in45 = d(45), in60 = d(60);
  const yesterday = d(-1), twoDaysAgo = d(-2), threeDaysAgo = d(-3), fourDaysAgo = d(-4);
  const fiveDaysAgo = d(-5), sixDaysAgo = d(-6), oneWeekAgo = d(-7);
  const twoWeeksAgo = d(-14), threeWeeksAgo = d(-21);

  function T(overrides) {
    return Object.assign({
      id: 'p' + (++_tid), title: '', category: '', today: false, todayOrder: null,
      done: false, completedAt: null, recurring: null, recurDays: null, dueDate: null,
      projectId: null, notes: '', drawer: false, drawerCategory: null,
      isProject: false, trackTime: false, timeSessions: [], projectOrder: null
    }, overrides);
  }
  var _tid = 0;

  // ═══════════════════════════════════════════
  // TODAY (7 active + 4 crushed = 11)
  // ═══════════════════════════════════════════
  store.tasks.push(
    T({ title: 'QBO — Pay bills, all orgs', today: true, todayOrder: 1, recurring: 'weekly', recurDays: [1], dueDate: today }),
    T({ title: 'Send AGING reminders', today: true, todayOrder: 2, recurring: 'weekly', recurDays: [1], dueDate: today }),
    T({ title: 'Review quarterly report draft', today: true, todayOrder: 3, dueDate: today, notes: 'Check figures against actuals\n[ ] Revenue section\n[ ] Expense section\n[ ] Cash flow\n[ ] Footnotes' }),
    T({ title: 'Call accountant re: Q1 filing', today: true, todayOrder: 4, dueDate: today }),
    T({ title: 'Pay Austin and Holly', today: true, todayOrder: 5, dueDate: tomorrow }),
    T({ title: 'Draft investor update email', today: true, todayOrder: 6, dueDate: today, notes: 'Keep it under 500 words\nHighlight new product launch', trackTime: true }),
    T({ title: 'Prep slide deck for board mtg', today: true, todayOrder: 7, dueDate: in2, notes: '[ ] Financial overview\n[ ] Product roadmap\n[ ] Q&A topics', trackTime: true, timeSessions: [{ date: yesterday, minutes: 45, note: 'Outline + structure' }] }),
    // Crushed today
    T({ title: 'Send invoice to Acme Corp', today: true, done: true, completedAt: ts(0, 8, 15), dueDate: today }),
    T({ title: 'Update team Slack channel', today: true, done: true, completedAt: ts(0, 9, 0), dueDate: today }),
    T({ title: 'Book conference room for Wed', today: true, done: true, completedAt: ts(0, 9, 30) }),
    T({ title: 'Review and approve PTO requests', today: true, done: true, completedAt: ts(0, 10, 45), recurring: 'weekly', recurDays: [1], dueDate: today })
  );

  // ═══════════════════════════════════════════
  // PROJECTS (5 projects with checklists + time)
  // ═══════════════════════════════════════════
  store.tasks.push(
    T({ title: 'Website redesign', isProject: true, trackTime: true, dueDate: in14, projectOrder: 1,
        notes: '[x] Competitor analysis\n[x] Content audit\n[x] Wireframes\n[ ] Color palette\n[ ] Mobile mockups\n[ ] Dev handoff\n[ ] QA review',
        timeSessions: [
          { date: oneWeekAgo, minutes: 120, note: 'Competitor research & screenshots' },
          { date: sixDaysAgo, minutes: 90, note: 'Content audit spreadsheet' },
          { date: fourDaysAgo, minutes: 60, note: 'Wireframe sketches' },
          { date: twoDaysAgo, minutes: 150, note: 'Wireframes in Figma' },
          { date: yesterday, minutes: 45, note: 'Revision pass' }
        ]
    }),
    T({ title: 'DORIS CRM migration', isProject: true, trackTime: true, dueDate: in21, projectOrder: 2,
        notes: '[x] Export legacy contacts\n[x] Map field schema\n[ ] Import test batch\n[ ] Validate data integrity\n[ ] Train team on new UI\n[ ] Go-live checklist',
        timeSessions: [
          { date: twoWeeksAgo, minutes: 60, note: 'Schema mapping doc' },
          { date: oneWeekAgo, minutes: 180, note: 'Export scripts + cleanup' },
          { date: threeDaysAgo, minutes: 90, note: 'Test import round 1' }
        ]
    }),
    T({ title: 'Q2 marketing campaign', isProject: true, trackTime: true, dueDate: in30, projectOrder: 3,
        notes: '[x] Define target audience\n[ ] Draft ad copy (3 variants)\n[ ] Design landing page\n[ ] Set up tracking pixels\n[ ] Launch A/B test',
        timeSessions: [
          { date: fiveDaysAgo, minutes: 60, note: 'Audience research' },
          { date: yesterday, minutes: 30, note: 'Brainstorm session notes' }
        ]
    }),
    T({ title: 'Office buildout — Phase 2', isProject: true, trackTime: true, dueDate: in45, projectOrder: 4,
        notes: '[ ] Get contractor bids\n[ ] Select furniture vendor\n[ ] Order standing desks (8)\n[ ] Schedule electrical work\n[ ] Paint color samples',
        timeSessions: [
          { date: twoWeeksAgo, minutes: 30, note: 'Called 2 contractors' }
        ]
    }),
    T({ title: 'Employee handbook update', isProject: true, trackTime: true, dueDate: in10, projectOrder: 5,
        notes: '[x] Review current version\n[x] Flag outdated policies\n[ ] Draft remote work section\n[ ] Legal review\n[ ] Distribute to team',
        timeSessions: [
          { date: fourDaysAgo, minutes: 90, note: 'Read-through + redlines' },
          { date: twoDaysAgo, minutes: 60, note: 'Drafted new sections' }
        ]
    })
  );

  // ═══════════════════════════════════════════
  // ON DECK (16 tasks — mix of dates, recurring, notes)
  // ═══════════════════════════════════════════
  store.tasks.push(
    // Due within a week
    T({ title: 'Schedule dentist appointment', dueDate: tomorrow }),
    T({ title: 'Follow up with vendor on pricing', dueDate: tomorrow, recurring: 'weekly', recurDays: [2] }),
    T({ title: 'Send quarterly tax estimate', dueDate: in2, notes: 'Check with accountant first' }),
    T({ title: 'Review and sign lease amendment', dueDate: in3 }),
    T({ title: 'Order new office supplies', dueDate: in4, notes: '[ ] Printer paper\n[ ] Sticky notes\n[ ] Pens\n[ ] Whiteboard markers' }),
    T({ title: 'Lunch with Sarah — catch up', dueDate: in5 }),
    T({ title: 'Submit expense reports', dueDate: in6, recurring: 'monthly' }),
    // Due 1-4 weeks out
    T({ title: 'Review insurance renewal docs', dueDate: in10 }),
    T({ title: 'Plan team offsite agenda', dueDate: in14, notes: 'Theme ideas: strategy, culture, fun\nVenue: TBD' }),
    T({ title: 'Prep mid-year performance reviews', dueDate: in14, trackTime: true }),
    T({ title: 'Research new payroll provider', dueDate: in21, notes: 'Compare Gusto, Rippling, Justworks' }),
    T({ title: 'Update company LinkedIn page', dueDate: in21 }),
    T({ title: 'File annual report with state', dueDate: in30 }),
    // 30+ day (hidden by default toggle)
    T({ title: 'Renew business license', dueDate: in45 }),
    T({ title: 'Plan holiday party', dueDate: in60 }),
    // No date
    T({ title: 'Clean out storage closet' }),
    T({ title: 'Call locksmith for office rekey', dueDate: in3 }),
    T({ title: 'Draft blog post about company culture', dueDate: in10, trackTime: true }),
    T({ title: 'Set up new hire onboarding checklist', dueDate: nextWeek, notes: '[ ] Laptop order\n[ ] Email setup\n[ ] Slack invite\n[ ] First-week schedule' })
  );

  // ═══════════════════════════════════════════
  // DRAWER (8 tasks across 3 categories + uncategorized)
  // ═══════════════════════════════════════════
  store.drawerCategories = {
    biz: { label: 'Business Ideas', color: '#e52e0a' },
    home: { label: 'Home', color: '#27ae60' },
    learn: { label: 'Learning', color: '#2456a4' }
  };
  store.tasks.push(
    T({ title: 'Research CRM options', drawer: true, drawerCategory: 'biz', notes: 'Look at HubSpot, Pipedrive, Close' }),
    T({ title: 'Explore franchise opportunities', drawer: true, drawerCategory: 'biz' }),
    T({ title: 'Brainstorm SaaS product ideas', drawer: true, drawerCategory: 'biz' }),
    T({ title: 'Fix kitchen faucet leak', drawer: true, drawerCategory: 'home' }),
    T({ title: 'Organize garage', drawer: true, drawerCategory: 'home' }),
    T({ title: 'Read "The Hard Thing About Hard Things"', drawer: true, drawerCategory: 'learn' }),
    T({ title: 'Take online SQL course', drawer: true, drawerCategory: 'learn' }),
    T({ title: 'Book vacation flights', drawer: true, drawerCategory: null }),
    T({ title: 'Look into warehouse space', drawer: true, drawerCategory: 'biz' }),
    T({ title: 'Replace smoke detector batteries', drawer: true, drawerCategory: 'home' }),
    T({ title: 'Watch Stripe Atlas walkthrough', drawer: true, drawerCategory: 'learn' }),
    T({ title: 'Find a good barber', drawer: true, drawerCategory: null })
  );

  // ═══════════════════════════════════════════
  // KILLED (3 tasks)
  // ═══════════════════════════════════════════
  store.killedTasks.push(
    T({ title: 'Old vendor contract review', dueDate: oneWeekAgo, killedAt: ts(-3, 14, 0) }),
    T({ title: 'Attend networking mixer', dueDate: threeDaysAgo, killedAt: ts(-2, 9, 0), notes: 'Cancelled by organizer' }),
    T({ title: 'Set up fax line (lol)', killedAt: ts(-5, 11, 0) })
  );

  // ═══════════════════════════════════════════
  // HALL OF FAME — Backfill completion log
  // ═══════════════════════════════════════════
  // Today: 4 completions (the crushed tasks above)
  completionLog.push(
    { ts: ts(0, 8, 15) }, { ts: ts(0, 9, 0) }, { ts: ts(0, 9, 30) }, { ts: ts(0, 10, 45) }
  );
  // Yesterday: 6 completions (a strong day)
  for (var i = 0; i < 6; i++) completionLog.push({ ts: ts(-1, 8 + i, 20) });
  // 2 days ago: 3
  for (var i = 0; i < 3; i++) completionLog.push({ ts: ts(-2, 9 + i, 0) });
  // 3 days ago: 8 (best day!)
  for (var i = 0; i < 8; i++) completionLog.push({ ts: ts(-3, 7 + i, 15) });
  // 4 days ago: 5
  for (var i = 0; i < 5; i++) completionLog.push({ ts: ts(-4, 8 + i, 30) });
  // 5 days ago: 2
  for (var i = 0; i < 2; i++) completionLog.push({ ts: ts(-5, 10 + i, 0) });
  // 6 days ago: 4
  for (var i = 0; i < 4; i++) completionLog.push({ ts: ts(-6, 9 + i, 45) });
  // Last week scatter (for weekly totals)
  for (var i = 0; i < 7; i++) completionLog.push({ ts: ts(-7 - i, 10, 0) });
  // Two weeks ago cluster: 5 on one day
  for (var i = 0; i < 5; i++) completionLog.push({ ts: ts(-14, 8 + i, 0) });
  // Three weeks ago: 3
  for (var i = 0; i < 3; i++) completionLog.push({ ts: ts(-21, 9 + i, 0) });

  // ═══════════════════════════════════════════
  // CREATURE UNLOCKS (spawn a few friends)
  // ═══════════════════════════════════════════
  store.nextId = 200;

  // Boot the UI
  setDate();
  render();
  renderHallOfFame();

  // Spawn creatures after header settles
  setTimeout(function() {
    try {
      // Spawn 4 creatures from today's crushed tasks
      for (var c = 0; c < 4; c++) {
        if (typeof spawnCreature === 'function') spawnCreature();
      }
    } catch(e) {}
  }, 800);

  // Clear the localStorage gate so the popup shows every preview load
  try { localStorage.removeItem('tinyape-due-today-shown'); } catch(e) {}
  setTimeout(function() { checkDueTodayPopup(); }, 1200);
})();
</script>

</body>
</html>
